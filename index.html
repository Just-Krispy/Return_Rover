<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Return Rover — fast, friendly product return and refund processing.">
    <meta name="theme-color" content="#0a0e17">
    <title>Return Rover</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/snowfall.css">
</head>
<body>
    <canvas id="three-bg" aria-hidden="true"></canvas>

    <div class="page-wrapper">
        <header>
            <img src="images/puppy_envelope.png" class="logo" alt="Return Rover mascot — a puppy carrying an envelope" width="200" height="200">
            <h1>Return Rover</h1>
            <p class="tagline">Fast, friendly returns — let's fetch your refund.</p>
        </header>

        <main>
            <div id="chat-container" role="log" aria-live="polite" aria-label="Return form conversation">
                <div id="chat-messages"></div>
                <form id="chat-form" autocomplete="off">
                    <label for="user-input" class="sr-only">Your response</label>
                    <input type="text" id="user-input" placeholder="Type your response..." aria-required="true">
                    <button type="submit" id="send-btn" aria-label="Send response">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </form>
            </div>

            <div id="progress-bar" aria-label="Form progress">
                <div class="step active" data-step="1">Name</div>
                <div class="step" data-step="2">Email</div>
                <div class="step" data-step="3">Phone</div>
                <div class="step" data-step="4">Upload</div>
            </div>
        </main>

        <footer>
            <p>&copy; 2023–2026 Return Rover. All rights reserved.</p>
        </footer>
    </div>

    <button id="dark-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <script src="js/three-bg.js"></script>
    <script src="js/snowfall.js"></script>
    <script src="js/custom.js"></script>
</body>
</html>
