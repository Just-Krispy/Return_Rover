<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Transition Test</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            margin: 5px 0;
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        .status {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Camera Transition Test</h3>
        <button onclick="flyToRandom()">Fly to Random Point</button><br>
        <button onclick="flyToOrigin()">Fly Home</button><br>
        <button onclick="toggleRotate()">Toggle Auto-Rotate</button>
        <div class="status">
            <div>Transitioning: <span id="transitioning">false</span></div>
            <div>Progress: <span id="progress">0%</span></div>
            <div>Duration: <span id="duration">0ms</span></div>
            <div>Distance: <span id="distance">0</span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="camera-transitions.js"></script>
    <script>
        // Setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.001);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add some reference objects
        const geometry = new THREE.SphereGeometry(5, 32, 32);
        
        // Create grid of spheres
        const nodes = [];
        for (let i = 0; i < 50; i++) {
            const material = new THREE.MeshPhongMaterial({
                color: Math.random() * 0xffffff,
                emissive: Math.random() * 0x444444
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(
                (Math.random() - 0.5) * 400,
                (Math.random() - 0.5) * 200,
                (Math.random() - 0.5) * 400
            );
            scene.add(sphere);
            nodes.push(sphere);
        }

        // Add lights
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 1000);
        pointLight.position.set(50, 50, 50);
        scene.add(pointLight);

        // Initialize cinematic camera
        const cinematicCamera = new CinematicCamera(camera, scene);

        // Controls
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastMouse.x;
                const dy = e.clientY - lastMouse.y;
                cinematicCamera.handleDrag(dx, dy);
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });

        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            cinematicCamera.handleZoom(e.deltaY);
        });

        // Test functions
        function flyToRandom() {
            const target = nodes[Math.floor(Math.random() * nodes.length)];
            const randomTheta = cinematicCamera.theta + (Math.random() - 0.5) * Math.PI;
            const randomPhi = Math.PI * 0.3 + Math.random() * Math.PI * 0.2;
            const randomDist = 50 + Math.random() * 100;
            
            cinematicCamera.flyTo(
                randomTheta,
                randomPhi,
                randomDist,
                target.position
            );
        }

        function flyToOrigin() {
            cinematicCamera.reset(false);
        }

        function toggleRotate() {
            cinematicCamera.toggleAutoRotate();
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            cinematicCamera.update();
            
            // Update status display
            document.getElementById('transitioning').textContent = cinematicCamera.isTransitioning;
            document.getElementById('progress').textContent = 
                (cinematicCamera.transitionProgress * 100).toFixed(1) + '%';
            document.getElementById('duration').textContent = 
                cinematicCamera.transitionDuration.toFixed(0) + 'ms';
            
            const currentPos = cinematicCamera.calculateCameraPosition(
                cinematicCamera.theta,
                cinematicCamera.phi,
                cinematicCamera.distance,
                cinematicCamera.lookAt
            );
            const distToOrigin = currentPos.length();
            document.getElementById('distance').textContent = distToOrigin.toFixed(1);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
