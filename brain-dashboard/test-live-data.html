<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Data Integration Test - Iran Enrichment Node</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b;
            color: #fafafa;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .test-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(24, 24, 27, 0.95);
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            width: 300px;
            z-index: 100;
        }
        .test-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #22d3ee;
        }
        .test-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #27272a;
        }
        .test-section:last-child {
            border-bottom: none;
        }
        .test-label {
            font-size: 12px;
            color: #71717a;
            margin-bottom: 8px;
        }
        .test-value {
            font-size: 14px;
            color: #fafafa;
            margin-bottom: 4px;
        }
        .test-btn {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
        }
        .test-btn:hover {
            background: #2563eb;
        }
        .test-btn.secondary {
            background: #27272a;
        }
        .test-btn.secondary:hover {
            background: #3f3f46;
        }
        .status {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .status.success {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }
        .status.error {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }
        .node-info {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }
        .node-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .node-info-label {
            color: #a1a1aa;
        }
        .node-info-value {
            color: #fafafa;
            font-weight: 500;
        }
        .trend-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .trend-badge.escalating {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
        .log {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(24, 24, 27, 0.95);
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }
        .log-title {
            font-size: 12px;
            font-weight: 600;
            color: #a1a1aa;
            margin-bottom: 8px;
        }
        .log-entry {
            font-size: 11px;
            color: #71717a;
            margin-bottom: 4px;
            font-family: 'SF Mono', monospace;
        }
        .log-entry.success {
            color: #4ade80;
        }
        .log-entry.error {
            color: #f87171;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- Test Control Panel -->
    <div class="test-panel">
        <div class="test-title">🧪 Live Data Test</div>
        
        <div class="test-section">
            <div class="test-label">Target Location</div>
            <div class="test-value">Natanz, Iran</div>
            <div class="test-value" style="font-size: 12px; color: #71717a;">33.7241°N, 51.3303°E</div>
        </div>

        <div class="test-section">
            <button class="test-btn" id="fetch-iaea-btn">Fetch IAEA Data</button>
            <button class="test-btn secondary" id="create-node-btn" disabled>Create Node on Globe</button>
            <button class="test-btn secondary" id="zoom-to-node-btn" disabled>Zoom to Node</button>
        </div>

        <div class="test-section">
            <div class="test-label">Node Status</div>
            <div id="node-status" class="status error">Not Created</div>
        </div>

        <div id="iaea-data-display" style="display: none;">
            <div class="test-section">
                <div class="test-label">IAEA Data (Simulated)</div>
                <div class="node-info">
                    <div class="node-info-item">
                        <span class="node-info-label">Enrichment</span>
                        <span class="node-info-value" id="enrichment-value">--</span>
                    </div>
                    <div class="node-info-item">
                        <span class="node-info-label">Stockpile</span>
                        <span class="node-info-value" id="stockpile-value">--</span>
                    </div>
                    <div class="node-info-item">
                        <span class="node-info-label">Trend</span>
                        <span class="node-info-value" id="trend-value">--</span>
                    </div>
                    <div class="node-info-item">
                        <span class="node-info-label">Breakout Time</span>
                        <span class="node-info-value" id="breakout-value">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Console Log -->
    <div class="log">
        <div class="log-title">Console Log</div>
        <div id="log-output"></div>
    </div>

    <script>
        // Simple Three.js scene setup
        let scene, camera, renderer, globe, dataNode;
        let liveDataManager;

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x09090b);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Create simple globe
            const globeGeometry = new THREE.SphereGeometry(1, 64, 64);
            const globeMaterial = new THREE.MeshBasicMaterial({
                color: 0x1a1a2e,
                wireframe: true
            });
            globe = new THREE.Mesh(globeGeometry, globeMaterial);
            scene.add(globe);

            // Add ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);

            // Window resize
            window.addEventListener('resize', onWindowResize);

            log('Three.js scene initialized', 'success');
            log('Globe created at origin', 'success');

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Slow rotation
            globe.rotation.y += 0.001;
            
            // Pulse data node if exists
            if (dataNode) {
                const scale = 0.4 + 0.1 * Math.sin(Date.now() * 0.003);
                dataNode.scale.set(scale, scale, 1);
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);
            return new THREE.Vector3(x, y, z);
        }

        function createPulsingCanvas() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            // Red pulsing gradient
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(248, 113, 113, 1)');
            gradient.addColorStop(0.5, 'rgba(248, 113, 113, 0.6)');
            gradient.addColorStop(1, 'rgba(248, 113, 113, 0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(32, 32, 28, 0, Math.PI * 2);
            ctx.fill();

            // White center dot
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(32, 32, 8, 0, Math.PI * 2);
            ctx.fill();

            return canvas;
        }

        // Test Functions
        async function fetchIAEAData() {
            log('Fetching IAEA data (simulated)...');
            
            // Simulate API delay
            await new Promise(resolve => setTimeout(resolve, 1000));

            const data = {
                name: "Natanz",
                lat: 33.7241,
                lon: 51.3303,
                enrichmentPercent: 60,
                stockpileKg: 114.1,
                trend: "escalating",
                breakoutTime: "12 days"
            };

            log('IAEA data received', 'success');
            displayIAEAData(data);
            
            document.getElementById('create-node-btn').disabled = false;
            
            return data;
        }

        function displayIAEAData(data) {
            document.getElementById('iaea-data-display').style.display = 'block';
            document.getElementById('enrichment-value').innerHTML = `${data.enrichmentPercent}% <span class="trend-badge escalating">↑</span>`;
            document.getElementById('stockpile-value').textContent = `${data.stockpileKg} kg`;
            document.getElementById('trend-value').innerHTML = `<span class="trend-badge escalating">${data.trend}</span>`;
            document.getElementById('breakout-value').textContent = data.breakoutTime;
        }

        function createNodeOnGlobe() {
            log('Creating data node at Natanz...');

            const lat = 33.7241;
            const lon = 51.3303;
            const pos = latLonToVector3(lat, lon, 1.02);

            // Create sprite
            const canvas = createPulsingCanvas();
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ 
                map: texture, 
                transparent: true, 
                opacity: 0.9 
            });
            dataNode = new THREE.Sprite(material);
            dataNode.position.copy(pos);
            dataNode.scale.set(0.4, 0.4, 1);
            
            scene.add(dataNode);

            log('Pulsing node created at 33.7241°N, 51.3303°E', 'success');
            log('Node color: Red (escalating enrichment)', 'success');

            document.getElementById('node-status').textContent = 'Active (Pulsing)';
            document.getElementById('node-status').className = 'status success';
            document.getElementById('zoom-to-node-btn').disabled = false;
        }

        function zoomToNode() {
            if (!dataNode) return;

            log('Zooming to node...');

            // Animate camera to node position
            const targetPos = dataNode.position.clone().normalize().multiplyScalar(2.5);
            
            const duration = 1500;
            const startPos = camera.position.clone();
            const startTime = Date.now();

            function animateZoom() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3); // Ease out cubic

                camera.position.lerpVectors(startPos, targetPos, eased);
                camera.lookAt(0, 0, 0);

                if (progress < 1) {
                    requestAnimationFrame(animateZoom);
                } else {
                    log('Zoom complete — node should be centered', 'success');
                }
            }

            animateZoom();
        }

        function log(message, type = 'info') {
            const logOutput = document.getElementById('log-output');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logOutput.appendChild(entry);
            logOutput.scrollTop = logOutput.scrollHeight;

            // Keep only last 20 entries
            while (logOutput.children.length > 20) {
                logOutput.removeChild(logOutput.firstChild);
            }
        }

        // Event Listeners
        document.getElementById('fetch-iaea-btn').addEventListener('click', fetchIAEAData);
        document.getElementById('create-node-btn').addEventListener('click', createNodeOnGlobe);
        document.getElementById('zoom-to-node-btn').addEventListener('click', zoomToNode);

        // Initialize
        init();
        log('Test environment ready');
        log('Click "Fetch IAEA Data" to begin test');
    </script>
</body>
</html>
