<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <radialGradient id="headShade" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </radialGradient>
    <radialGradient id="bodyShade" cx="45%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </radialGradient>
    <radialGradient id="eyeShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="earGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="earGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="envBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="collarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === TAIL (behind body) === -->
  <path d="M148 140 C162 128, 172 125, 170 112 C168 104, 160 102, 158 110"
        stroke="#F59E0B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- === BODY (small, compact — Pixar style) === -->
  <ellipse cx="100" cy="152" rx="38" ry="32" fill="url(#bodyShade)"/>
  <!-- Belly -->
  <ellipse cx="100" cy="157" rx="22" ry="18" fill="#FEF3C7" opacity="0.5"/>

  <!-- === LEGS === -->
  <!-- Back left -->
  <ellipse cx="74" cy="180" rx="14" ry="11" fill="url(#bodyShade)"/>
  <ellipse cx="74" cy="184" rx="8" ry="5" fill="#FBBF24" opacity="0.3"/>
  <!-- Back right -->
  <ellipse cx="126" cy="180" rx="14" ry="11" fill="url(#bodyShade)"/>
  <ellipse cx="126" cy="184" rx="8" ry="5" fill="#FBBF24" opacity="0.3"/>
  <!-- Front left paw -->
  <ellipse cx="78" cy="186" rx="10" ry="7" fill="#F8FAFC"/>
  <ellipse cx="78" cy="188" rx="5" ry="3" fill="#FDE68A" opacity="0.5"/>
  <!-- Front right paw -->
  <ellipse cx="122" cy="186" rx="10" ry="7" fill="#F8FAFC"/>
  <ellipse cx="122" cy="188" rx="5" ry="3" fill="#FDE68A" opacity="0.5"/>

  <!-- === ENVELOPE (held in front) === -->
  <g transform="translate(64, 148)" filter="url(#softShadow)">
    <rect x="0" y="0" width="72" height="44" rx="5" fill="url(#envBody)"/>
    <path d="M0 4 L36 26 L72 4" fill="#60A5FA" opacity="0.9"/>
    <path d="M0 4 L36 26 L72 4" stroke="#4F46E5" stroke-width="0.5" fill="none" opacity="0.3"/>
    <line x1="18" y1="32" x2="54" y2="32" stroke="white" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
    <line x1="22" y1="37" x2="50" y2="37" stroke="white" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
    <!-- Heart seal -->
    <path d="M33 15 C33 11.5, 36 9.5, 38 13 C40 9.5, 43 11.5, 43 15 C43 19.5, 38 23, 38 23 C38 23, 33 19.5, 33 15Z" fill="#F472B6"/>
  </g>

  <!-- === LEFT EAR (big, floppy — hangs down) === -->
  <path d="M60 68 C42 38, 18 48, 28 78 C32 90, 46 96, 58 86" fill="url(#earGrad)"/>
  <path d="M56 72 C44 50, 30 56, 36 76 C38 84, 46 88, 54 82" fill="#FDE68A" opacity="0.4"/>

  <!-- === RIGHT EAR (big, floppy — hangs down) === -->
  <path d="M140 68 C158 38, 182 48, 172 78 C168 90, 154 96, 142 86" fill="url(#earGrad2)"/>
  <path d="M144 72 C156 50, 170 56, 164 76 C162 84, 154 88, 146 82" fill="#FDE68A" opacity="0.4"/>

  <!-- === HEAD (oversized — Pixar ratio) === -->
  <circle cx="100" cy="80" r="52" fill="url(#headShade)"/>

  <!-- Forehead spot -->
  <path d="M72 55 C78 38, 115 35, 125 50 C130 58, 122 70, 100 66 C82 63, 68 62, 72 55Z"
        fill="#FBBF24" opacity="0.35"/>

  <!-- Cheek blush -->
  <ellipse cx="62" cy="90" rx="10" ry="6" fill="#FCA5A5" opacity="0.2"/>
  <ellipse cx="138" cy="90" rx="10" ry="6" fill="#FCA5A5" opacity="0.2"/>

  <!-- === EYES (huge, glossy — Pixar style) === -->
  <!-- Left eye white -->
  <ellipse cx="82" cy="78" rx="16" ry="17" fill="white"/>
  <ellipse cx="82" cy="78" rx="16" ry="17" stroke="#E2E8F0" stroke-width="0.5" fill="none"/>
  <!-- Left iris -->
  <circle cx="84" cy="80" r="10" fill="url(#eyeShine)"/>
  <!-- Left pupil -->
  <circle cx="84" cy="80" r="6" fill="#111827"/>
  <!-- Left eye highlights -->
  <circle cx="88" cy="75" r="4" fill="white" opacity="0.95"/>
  <circle cx="80" cy="84" r="2" fill="white" opacity="0.5"/>

  <!-- Right eye white -->
  <ellipse cx="118" cy="78" rx="16" ry="17" fill="white"/>
  <ellipse cx="118" cy="78" rx="16" ry="17" stroke="#E2E8F0" stroke-width="0.5" fill="none"/>
  <!-- Right iris -->
  <circle cx="116" cy="80" r="10" fill="url(#eyeShine)"/>
  <!-- Right pupil -->
  <circle cx="116" cy="80" r="6" fill="#111827"/>
  <!-- Right eye highlights -->
  <circle cx="120" cy="75" r="4" fill="white" opacity="0.95"/>
  <circle cx="112" cy="84" r="2" fill="white" opacity="0.5"/>

  <!-- Eyebrows (expressive) -->
  <path d="M68 62 Q78 56 90 60" stroke="#94A3B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M132 62 Q122 56 110 60" stroke="#94A3B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- === NOSE (big, shiny) === -->
  <ellipse cx="100" cy="98" rx="8" ry="6" fill="#1E293B"/>
  <ellipse cx="102" cy="96" rx="3" ry="2" fill="white" opacity="0.45"/>

  <!-- Mouth -->
  <path d="M92 104 Q96 110 100 104 Q104 110 108 104" stroke="#94A3B8" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="100" cy="110" rx="5" ry="6" fill="#FDA4AF" opacity="0.85"/>
  <ellipse cx="100" cy="108" rx="3" ry="3" fill="#FCA5A5" opacity="0.4"/>

  <!-- === COLLAR === -->
  <path d="M60 122 Q100 136 140 122" stroke="url(#collarGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Collar tag -->
  <g transform="translate(93, 130)">
    <circle cx="7" cy="7" r="8" fill="#FBBF24"/>
    <circle cx="7" cy="7" r="6" fill="#F59E0B"/>
    <text x="7" y="10" text-anchor="middle" font-size="8" font-weight="800" fill="white" font-family="Arial, sans-serif">R</text>
    <!-- Tag ring -->
    <circle cx="7" cy="-1" r="2.5" stroke="#D97706" stroke-width="1.5" fill="none"/>
  </g>
</svg>
