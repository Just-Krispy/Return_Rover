<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <linearGradient id="envBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="collarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- ======= TAIL (behind body) ======= -->
  <path d="M148 160 C158 142, 166 128, 162 116"
        stroke="#C8A46E" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M148 160 C158 142, 166 128, 162 116"
        stroke="#DABB87" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- ======= BODY ======= -->
  <ellipse cx="100" cy="170" rx="44" ry="36" fill="#C8A46E"/>
  <ellipse cx="100" cy="174" rx="30" ry="24" fill="#DABB87"/>

  <!-- ======= BACK PAWS ======= -->
  <ellipse cx="68" cy="200" rx="14" ry="10" fill="#C8A46E"/>
  <ellipse cx="132" cy="200" rx="14" ry="10" fill="#C8A46E"/>

  <!-- ======= FRONT LEGS ======= -->
  <rect x="74" y="180" width="16" height="30" rx="8" fill="#C8A46E"/>
  <rect x="110" y="180" width="16" height="30" rx="8" fill="#C8A46E"/>
  <!-- Front paws -->
  <ellipse cx="82" cy="212" rx="12" ry="7" fill="#DABB87"/>
  <ellipse cx="118" cy="212" rx="12" ry="7" fill="#DABB87"/>

  <!-- ======= ENVELOPE (in mouth) ======= -->
  <g transform="translate(60, 110) rotate(-5)">
    <rect x="0" y="0" width="80" height="48" rx="4" fill="url(#envBody)"/>
    <path d="M0 5 L40 28 L80 5" fill="#60A5FA" opacity="0.8"/>
    <path d="M0 5 L40 28 L80 5" stroke="#4338CA" stroke-width="0.5" fill="none" opacity="0.3"/>
    <line x1="20" y1="36" x2="60" y2="36" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
    <!-- Heart seal -->
    <path d="M37 13 C37 9, 40 7, 42 11 C44 7, 47 9, 47 13 C47 18, 42 21, 42 21 C42 21, 37 18, 37 13Z" fill="#F472B6"/>
  </g>

  <!-- ======= LEFT EAR (long, floppy, hanging WAY down) ======= -->
  <ellipse cx="52" cy="82" rx="20" ry="46" transform="rotate(15, 52, 82)" fill="#B08D57"/>
  <ellipse cx="52" cy="82" rx="14" ry="40" transform="rotate(15, 52, 82)" fill="#C8A46E" opacity="0.6"/>

  <!-- ======= RIGHT EAR (long, floppy, hanging WAY down) ======= -->
  <ellipse cx="148" cy="82" rx="20" ry="46" transform="rotate(-15, 148, 82)" fill="#B08D57"/>
  <ellipse cx="148" cy="82" rx="14" ry="40" transform="rotate(-15, 148, 82)" fill="#C8A46E" opacity="0.6"/>

  <!-- ======= HEAD (big round circle) ======= -->
  <circle cx="100" cy="72" r="52" fill="#C8A46E"/>
  <!-- Lighter face center -->
  <circle cx="100" cy="76" r="38" fill="#DABB87" opacity="0.6"/>

  <!-- ======= MUZZLE (big, obvious, rounded bump) ======= -->
  <ellipse cx="100" cy="96" rx="26" ry="20" fill="#E8D5B0"/>
  <ellipse cx="100" cy="98" rx="22" ry="16" fill="#F0E4CC"/>

  <!-- ======= NOSE (big, black, shiny — tip of muzzle) ======= -->
  <ellipse cx="100" cy="90" rx="10" ry="8" fill="#2D2D2D"/>
  <ellipse cx="100" cy="90" rx="10" ry="8" fill="#1A1A1A"/>
  <!-- Nose shine -->
  <ellipse cx="96" cy="87" rx="4" ry="3" fill="white" opacity="0.3"/>

  <!-- ======= EYES (big, round, Pixar sparkle) ======= -->
  <!-- Left eye -->
  <circle cx="80" cy="68" r="14" fill="white"/>
  <circle cx="82" cy="70" r="9" fill="#4A3728"/>
  <circle cx="82" cy="70" r="5" fill="#1A1A1A"/>
  <circle cx="86" cy="66" r="4.5" fill="white" opacity="0.9"/>
  <circle cx="79" cy="73" r="2" fill="white" opacity="0.4"/>

  <!-- Right eye -->
  <circle cx="120" cy="68" r="14" fill="white"/>
  <circle cx="118" cy="70" r="9" fill="#4A3728"/>
  <circle cx="118" cy="70" r="5" fill="#1A1A1A"/>
  <circle cx="122" cy="66" r="4.5" fill="white" opacity="0.9"/>
  <circle cx="115" cy="73" r="2" fill="white" opacity="0.4"/>

  <!-- Eyebrows -->
  <path d="M64 54 Q74 48 88 54" stroke="#A07C50" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M136 54 Q126 48 112 54" stroke="#A07C50" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ======= MOUTH (big happy smile under muzzle) ======= -->
  <path d="M82 102 Q90 112 100 104 Q110 112 118 102"
        stroke="#A07C50" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Tongue (hanging out, happy pup) -->
  <ellipse cx="100" cy="112" rx="8" ry="10" fill="#F9A8D4"/>
  <ellipse cx="100" cy="110" rx="6" ry="6" fill="#FDA4AF"/>
  <line x1="100" y1="106" x2="100" y2="118" stroke="#F472B6" stroke-width="0.8" opacity="0.3"/>

  <!-- Cheek puffs -->
  <ellipse cx="62" cy="86" rx="8" ry="5" fill="#F9A8D4" opacity="0.2"/>
  <ellipse cx="138" cy="86" rx="8" ry="5" fill="#F9A8D4" opacity="0.2"/>

  <!-- ======= COLLAR ======= -->
  <path d="M54 120 Q100 140 146 120" stroke="url(#collarGrad)" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M58 122 Q100 138 142 122" stroke="white" stroke-width="1" fill="none" opacity="0.15" stroke-dasharray="3 4"/>

  <!-- Tag -->
  <g transform="translate(92, 134)">
    <circle cx="8" cy="0" r="3" stroke="#4338CA" stroke-width="2" fill="none"/>
    <circle cx="8" cy="8" r="9" fill="#FBBF24"/>
    <circle cx="8" cy="8" r="7" fill="#F59E0B"/>
    <text x="8" y="12" text-anchor="middle" font-size="9" font-weight="800" fill="white" font-family="Arial, sans-serif">R</text>
  </g>

  <!-- ======= WHISKER DOTS ======= -->
  <circle cx="72" cy="96" r="1.2" fill="#A07C50" opacity="0.4"/>
  <circle cx="68" cy="92" r="1.2" fill="#A07C50" opacity="0.4"/>
  <circle cx="128" cy="96" r="1.2" fill="#A07C50" opacity="0.4"/>
  <circle cx="132" cy="92" r="1.2" fill="#A07C50" opacity="0.4"/>
</svg>
