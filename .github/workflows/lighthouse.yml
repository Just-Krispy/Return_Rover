name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'brain-dashboard/**'
  pull_request:
    branches: [main]
    paths:
      - 'brain-dashboard/**'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse
        run: |
          lhci autorun \
            --collect.url="https://just-krispy.github.io/Return_Rover/brain-dashboard/" \
            --collect.numberOfRuns=3 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=off \
            --assert.assertions.categories:accessibility=off \
            --assert.assertions.categories:best-practices=off \
            --assert.assertions.categories:seo=off \
            --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Format Results
        if: always()
        run: |
          echo "## Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results uploaded to temporary public storage." >> $GITHUB_STEP_SUMMARY
          echo "Check the Lighthouse CI action output for scores and the report URL." >> $GITHUB_STEP_SUMMARY
