name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install brain-dashboard deps
        run: npm ci
        working-directory: brain-dashboard

      - name: Build brain-dashboard
        run: npm run build
        working-directory: brain-dashboard

      - name: Assemble deploy artifact
        run: |
          # Create a staging directory with the repo structure
          # but swap brain-dashboard source with the built dist
          mkdir -p /tmp/deploy
          # Copy everything except brain-dashboard contents
          rsync -a --exclude='brain-dashboard' . /tmp/deploy/
          # Copy the built dist as brain-dashboard
          cp -r brain-dashboard/dist /tmp/deploy/brain-dashboard

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
