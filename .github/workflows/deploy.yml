name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: brain-dashboard/package-lock.json

      - name: Install brain-dashboard deps
        run: npm ci
        working-directory: brain-dashboard

      - name: Build brain-dashboard
        run: npm run build
        working-directory: brain-dashboard

      # Replace the source brain-dashboard/ with the built dist/ so the
      # uploaded artifact includes the compiled assets while keeping
      # everything else (root index.html, other projects, etc.) intact.
      - name: Assemble deploy artifact
        run: |
          # Remove source brain-dashboard content (keep the dir)
          find brain-dashboard -mindepth 1 -not -name 'dist' -delete
          # Move built dist contents into brain-dashboard root
          cp -r brain-dashboard/dist/* brain-dashboard/
          # Remove the now-empty dist dir
          rm -rf brain-dashboard/dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
