name: Kanban Board Automation

on:
  issues:
    types: [opened, closed, reopened, assigned, unassigned, labeled, unlabeled, transferred]
  pull_request:
    types: [opened, closed, reopened, assigned, unassigned, labeled, unlabeled, transferred]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:
    inputs:
      board_name:
        description: 'Kanban board name (optional)'
        required: false
        default: 'Return Rover Board'

jobs:
  sync-board:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: automations/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: automations

      - name: Sync Issues to Kanban Board
        run: node scripts/sync-kanban.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BOARD_NAME: ${{ github.event.inputs.board_name || 'Return Rover Board' }}

      - name: Send Discord Notification
        run: node scripts/send-discord-notification.js
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sprint-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: automations/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: automations

      - name: Generate Sprint Report
        run: node scripts/generate-sprint-report.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SPRINT_START: ${{ github.event.inputs.sprint_start || '' }}
          SPRINT_END: ${{ github.event.inputs.sprint_end || '' }}

      - name: Upload Sprint Report
        uses: actions/upload-artifact@v4
        with:
          name: sprint-report
          path: reports/
          retention-days: 30
